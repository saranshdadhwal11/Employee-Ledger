{% extends "base.html" %}
{% block title %}Create account - Employee Ledger{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="ledger-mark large">EMS</div>
    <h1>Open a ledger account</h1>
    <p class="auth-sub">Your email is where login confirmations will be sent.</p>

    <form method="POST" novalidate>
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required autofocus autocomplete="username">
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autocomplete="email">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required autocomplete="new-password">
      </div>
      <button type="submit" class="btn-primary full">Create account</button>
    </form>

    <p class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>
  </div>
</div>
{% endblock %}
